name: cep_app
description: Creator Proof - Blockchain-verified proof of creation for digital content
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.25.4
  firebase_auth: ^4.17.4
  cloud_firestore: ^4.15.4
  firebase_storage: ^11.6.5
  google_sign_in: ^6.2.1

  # Blockchain / Web3
  web3dart: ^2.7.3
  walletconnect_flutter_v2: ^2.2.0
  http: ^1.2.0

  # UI Components
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # File handling
  file_picker: ^8.0.0
  image_picker: ^1.0.7
  crypto: ^3.0.3
  path: ^1.8.3
  mime: ^1.0.5
  path_provider: ^2.1.2

  # State Management
  provider: ^6.1.1
  flutter_riverpod: ^2.4.10

  # Navigation
  go_router: ^13.1.0

  # Storage
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.0.0

  # Utilities
  intl: ^0.18.1
  uuid: ^4.3.3
  url_launcher: ^6.2.4
  share_plus: ^7.2.2
  qr_flutter: ^4.1.0
  permission_handler: ^11.3.0

  # Animations
  flutter_animate: ^4.5.0
  lottie: ^3.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  build_runner: ^2.4.8

flutter:
  uses-material-design: true

